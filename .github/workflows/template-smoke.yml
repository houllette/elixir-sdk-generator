# Template smoke test
#
# This workflow runs the ENTIRE template pipeline end-to-end against the
# bundled example spec: setup -> generate -> compile -> test. It exists to
# catch template regressions before they reach downstream SDK repos.
#
# It only runs while this repo is still an unconfigured template (i.e. the
# {{PACKAGE_NAME}} placeholder is present). scripts/setup.sh deletes this
# file when a new SDK repo is configured from the template.
name: Template Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Generate and test example SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify this is the unconfigured template
        id: template_check
        run: |
          if grep -q '{{PACKAGE_NAME}}' generator-config.yaml; then
            echo "is_template=true" >> $GITHUB_OUTPUT
          else
            echo "is_template=false" >> $GITHUB_OUTPUT
            echo "::notice::Repository is already configured; skipping template smoke test."
          fi

      - name: Lint shell scripts
        if: steps.template_check.outputs.is_template == 'true'
        run: |
          for f in scripts/*.sh; do
            bash -n "$f"
          done
          shellcheck -S warning scripts/*.sh

      - name: Setup Java (for OpenAPI Generator)
        if: steps.template_check.outputs.is_template == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node.js (for OpenAPI Generator)
        if: steps.template_check.outputs.is_template == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install OpenAPI Generator
        if: steps.template_check.outputs.is_template == 'true'
        run: npm install -g @openapitools/openapi-generator-cli

      - name: Run setup non-interactively
        if: steps.template_check.outputs.is_template == 'true'
        run: |
          cat > /tmp/smoke-setup.json <<'EOF'
          {
            "package_name": "example_api",
            "description": "Example SDK generated by the template smoke test",
            "git_user": "example-org",
            "git_repo": "example-api",
            "base_url": "https://api.example.com/v1",
            "openapi_spec_path": "",
            "license": "MIT"
          }
          EOF
          ./scripts/setup.sh --config /tmp/smoke-setup.json --no-git

      # Generation runs BEFORE the BEAM is installed: setup-beam's post-install
      # (mix local.rebar) requires a mix.exs, which only exists after
      # generation. regenerate.sh skips its mix-based steps gracefully when
      # mix is absent; they are run explicitly below instead.
      - name: Regenerate SDK
        if: steps.template_check.outputs.is_template == 'true'
        run: SKIP_TESTS=1 ./scripts/regenerate.sh

      - name: Setup Elixir
        if: steps.template_check.outputs.is_template == 'true'
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      # regenerate.sh could not run these without mix on the PATH
      - name: Install dependencies and format generated code
        if: steps.template_check.outputs.is_template == 'true'
        run: |
          mix deps.get
          mix format

      - name: Compile with warnings as errors
        if: steps.template_check.outputs.is_template == 'true'
        run: MIX_ENV=test mix compile --warnings-as-errors

      - name: Run tests
        if: steps.template_check.outputs.is_template == 'true'
        run: mix test

      - name: Run coverage
        if: steps.template_check.outputs.is_template == 'true'
        run: mix coveralls

      # The same unified quality gate SDK users run locally and in CI
      - name: Run mix check
        if: steps.template_check.outputs.is_template == 'true'
        run: mix check

      - name: Verify key generated files exist
        if: steps.template_check.outputs.is_template == 'true'
        run: |
          for f in mix.exs \
                   lib/example_api/connection.ex \
                   lib/example_api/application.ex \
                   lib/example_api/api/users.ex; do
            if [ ! -f "$f" ]; then
              echo "::error::Expected generated file missing: $f"
              exit 1
            fi
          done

          # Setup must remove the one-shot /setup-sdk skill but keep /regenerate
          if [ -d .claude/skills/setup-sdk ]; then
            echo "::error::.claude/skills/setup-sdk should have been removed by setup.sh"
            exit 1
          fi
          if [ ! -f .claude/skills/regenerate/SKILL.md ]; then
            echo "::error::.claude/skills/regenerate should survive setup.sh"
            exit 1
          fi

          # Setup must fresh-initialize the SDK's release-facing docs
          if [ -f QUICKSTART.md ]; then
            echo "::error::QUICKSTART.md (template-only doc) should have been removed by setup.sh"
            exit 1
          fi
          if ! grep -q '<!-- changelog -->' CHANGELOG.md; then
            echo "::error::Fresh CHANGELOG.md should contain the git_ops marker"
            exit 1
          fi
          if grep -q 'Elixir SDK Generator Template' README.md; then
            echo "::error::README.md still looks like the template's README (should be the fresh SDK README)"
            exit 1
          fi
          if ! grep -q '# example_api' README.md; then
            echo "::error::Fresh README.md should be titled with the package name"
            exit 1
          fi
          if grep -q 'YourSDK' README.md; then
            echo "::error::README.md module-namespace placeholder was not filled by post-generate"
            exit 1
          fi
          echo "All expected files generated; docs fresh-initialized; template-only artifacts cleaned up."
